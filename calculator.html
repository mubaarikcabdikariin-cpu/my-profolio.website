<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Pro - Keyboard Connected</title>
    <style>
        /* CSS - Qurxinta */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            font-family: 'Segoe UI', sans-serif;
        }

        .calculator {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            margin-bottom: 15px;
            padding: 10px;
            border: none;
            background: #2d2d2d;
            color: #4ade80;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #333;
            color: white;
            transition: 0.2s;
        }

        button:hover { background-color: #444; }
        
        .operator { color: #fbbf24; }
        .clear { color: #f87171; }
        .equal { 
            background-color: #059669; 
            grid-column: span 2; 
        }

        /* Marka badhanka la riixo (Animation) */
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly placeholder="0">
    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="deleteLast()" class="operator">DEL</button>
        <button onclick="appendToDisplay('/')" class="operator">/</button>
        <button onclick="appendToDisplay('*')" class="operator">×</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')" class="operator">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('+')" class="operator">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('.')">.</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(input) {
        // Ka hortag inay labo calaamadood isku xigaan
        const lastChar = display.value.slice(-1);
        const ops = ['+', '-', '*', '/', '.'];
        if (ops.includes(input) && ops.includes(lastChar)) return;
        
        display.value += input;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            if (display.value !== "") {
                // eval() waxay xisaabinaysaa string-ka dhex yaala display-ga
                display.value = eval(display.value);
            }
        } catch (error) {
            display.value = "Error";
        }
    }

    // --- KOODHKII KIIBOODHKA EE AAD SOO DIRTY ---
    document.addEventListener('keydown', function(event) {
        const key = event.key;

        // Nambarada iyo calaamadaha
        if (!isNaN(key) || key === '.' || key === '+' || key === '-' || key === '*' || key === '/') {
            appendToDisplay(key);
        } 
        // Enter wuxuu qabanayaa shaqada =
        else if (key === 'Enter') {
            event.preventDefault(); // Inaanu page-ku refresh garoobin
            calculate();
        } 
        // Backspace wuxuu tirtirayaa hal xaraf
        else if (key === 'Backspace') {
            deleteLast();
        } 
        // Escape wuxuu tirtirayaa wax kasta (Clear)
        else if (key === 'Escape') {
            clearDisplay();
        }
    });
</script>

</body>
</html>
